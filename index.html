<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Sheet Generator</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #222; padding: 30px; border-radius: 10px; }
        h1 { text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0051cc; }
        #message { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; }
        .success { background: #1a6e1a; }
        .error { background: #6e1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Oil & Gas Title Run Sheet Generator</h1>

        <label>Abstractor Name *</label>
        <input type="text" id="abstractorName" placeholder="Enter your name">

        <label>Property Description *</label>
        <input type="text" id="propertyDescription" placeholder="Enter property description">

        <label>Parcel Number</label>
        <input type="text" id="parcelNumber" placeholder="e.g., 12-22-7">

        <label>Acreage</label>
        <input type="text" id="acreage" placeholder="e.g., 16.4">

        <label>District</label>
        <input type="text" id="district" placeholder="e.g., Mannington">

        <label>County</label>
        <input type="text" id="county" placeholder="e.g., Marion">

        <label>Upload PDF Documents</label>
        <input type="file" id="fileInput" multiple accept=".pdf">
        <p id="fileCount">No files selected</p>

        <button onclick="generateSheet()">📄 Generate Run Sheet</button>

        <div id="message"></div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function() {
            document.getElementById('fileCount').textContent = this.files.length + ' file(s) selected';
        });

        async function generateSheet() {
            const abstractorName = document.getElementById('abstractorName').value;
            const propertyDescription = document.getElementById('propertyDescription').value;
            const parcelNumber = document.getElementById('parcelNumber').value;
            const acreage = document.getElementById('acreage').value;
            const district = document.getElementById('district').value;
            const county = document.getElementById('county').value;
            const fileInput = document.getElementById('fileInput');
            const message = document.getElementById('message');

            if (!abstractorName || !propertyDescription) {
                showMessage('❌ Please fill in all required fields', 'error');
                return;
            }

            if (fileInput.files.length === 0) {
                showMessage('❌ Please select at least one PDF file', 'error');
                return;
            }

            showMessage('⏳ Processing documents... This may take 30-60 seconds', 'success');

            try {
                const formData = new FormData();
                for (let file of fileInput.files) {
                    formData.append('files', file);
                }
                formData.append('abstractorName', abstractorName);
                formData.append('propertyDescription', propertyDescription);
                formData.append('parcelNumber', parcelNumber);
                formData.append('acreage', acreage);
                formData.append('district', district);
                formData.append('county', county);

                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Run sheet generated! Check your downloads folder.', 'success');
                    // Reset form
                    document.getElementById('abstractorName').value = '';
                    document.getElementById('propertyDescription').value = '';
                    document.getElementById('fileInput').value = '';
                    document.getElementById('fileCount').textContent = 'No files selected';
                } else {
                    showMessage('❌ Error: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = type;
        }
    </script>
</body>
</html>
