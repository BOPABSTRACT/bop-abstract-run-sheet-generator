<!DOCTYPE html>

<html>

<head>

    <title>Run Sheet Generator</title>

</head>

<body style="font-family: Arial; margin: 20px;">

    <h1>Oil & Gas Title Run Sheet Generator</h1>

    

    <label>Abstractor Name:</label><br>

    <input type="text" id="abstractorName" placeholder="Enter name"><br><br>

    

    <label>Property Description:</label><br>

    <input type="text" id="propertyDescription" placeholder="Enter description"><br><br>

    

    <label>Upload PDFs:</label><br>

    <input type="file" id="fileInput" multiple accept=".pdf"><br><br>

    

    <button onclick="generateSheet()">Generate Run Sheet</button><br><br>

    

    <p id="message"></p>

    

    <script>

        function generateSheet() {

            const name = document.getElementById('abstractorName').value;

            const desc = document.getElementById('propertyDescription').value;

            const files = document.getElementById('fileInput').files;

            const msg = document.getElementById('message');

            

            if (!name || !desc) {

                msg.textContent = 'Please fill in all fields';

                return;

            }

            

            if (files.length === 0) {

                msg.textContent = 'Please upload at least one PDF';

                return;

            }

            

            msg.textContent = 'Processing ' + files.length + ' file(s)...';

            

            const formData = new FormData();

            for (let i = 0; i < files.length; i++) {

                formData.append('files', files[i]);

            }

            formData.append('abstractorName', name);

            formData.append('propertyDescription', desc);

            

            fetch('/api/process', {

                method: 'POST',

                body: formData

            })

            .then(res => res.json())

            .then(data => {

                if (data.success) {

                    msg.textContent = 'Success! Run sheet generated.';

                } else {

                    msg.textContent = 'Error: ' + data.error;

                }

            })

            .catch(err => {

                msg.textContent = 'Error: ' + err.message;

            });

        }

    </script>

</body>

</html>
