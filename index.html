<!DOCTYPE html>

<html>

<head>

    <title>Run Sheet Generator</title>

    <style>

        body { font-family: Arial; margin: 20px; background: #f5f5f5; }

        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }

        h1 { color: #333; }

        label { display: block; margin: 10px 0 5px 0; font-weight: bold; }

        input, select { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 3px; }

        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 16px; }

        button:hover { background: #0051cc; }

        .message { margin-top: 15px; padding: 10px; border-radius: 3px; display: none; }

        .success { background: #d4edda; color: #155724; }

        .error { background: #f8d7da; color: #721c24; }

    </style>

</head>

<body>

    <div class="container">

        <h1>Oil & Gas Title Run Sheet Generator</h1>

        

        <label>Abstractor Name *</label>

        <input type="text" id="abstractorName" placeholder="Enter your name">

        

        <label>Property Description *</label>

        <input type="text" id="propertyDescription" placeholder="Enter property description">

        

        <label>Parcel Number</label>

        <input type="text" id="parcelNumber" placeholder="e.g., 12-22-7">

        

        <label>Acreage</label>

        <input type="text" id="acreage" placeholder="e.g., 16.4">

        

        <label>District</label>

        <input type="text" id="district" placeholder="e.g., Mannington District">

        

        <label>County</label>

        <input type="text" id="county" placeholder="e.g., Marion">

        

        <label>State</label>

        <input type="text" id="state" placeholder="e.g., West Virginia">

        

        <button onclick="generateRunSheet()">Generate Run Sheet</button>

        

        <div id="message" class="message"></div>

    </div>



    <script>

        function generateRunSheet() {

            const abstractorName = document.getElementById('abstractorName').value;

            const propertyDescription = document.getElementById('propertyDescription').value;

            const parcelNumber = document.getElementById('parcelNumber').value;

            const acreage = document.getElementById('acreage').value;

            const district = document.getElementById('district').value;

            const county = document.getElementById('county').value;

            const state = document.getElementById('state').value;

            const messageDiv = document.getElementById('message');

                showMessage('Please fill in required fields', 'error');

                return;

            setTimeout(() => {

                createExcelFile(abstractorName, propertyDescription, parcelNumber, acreage, district, county, state);

                showMessage('Run sheet generated! Downloading...', 'success');

            }, 500);

        }
