<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Sheet Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #0070f3;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0070f3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #0051cc;
        }

        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }

        .success {
            background-color: #1a4d2e;
            color: #90ee90;
        }

        .error {
            background-color: #4d1a1a;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oil & Gas Title Run Sheet Generator</h1>

        <div class="form-group">
            <label for="abstractorName">Abstractor Name *</label>
            <input type="text" id="abstractorName" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="propertyDescription">Property Description *</label>
            <input type="text" id="propertyDescription" placeholder="Enter property description">
        </div>

        <div class="form-group">
            <label for="fileInput">Upload Documents (PDF)</label>
            <input type="file" id="fileInput" multiple accept=".pdf">
        </div>

        <button onclick="generateSheet()">Generate Run Sheet</button>

        <div id="message"></div>
    </div>

    <script>
        function generateSheet() {
            const abstractorName = document.getElementById('abstractorName').value;
            const propertyDescription = document.getElementById('propertyDescription').value;
            const fileInput = document.getElementById('fileInput');
            const messageDiv = document.getElementById('message');

            if (!abstractorName || !propertyDescription) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            showMessage('✅ System is working! Files ready: ' + fileInput.files.length, 'success');
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
