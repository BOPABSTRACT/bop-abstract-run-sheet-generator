<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Sheet Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5a962 0%, #333333 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h1 {
            color: #f5a962;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 3px solid #333;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #f5a962;
            background-color: #fff9f5;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #f5a962;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #e09350;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        #message.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }

        #message.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }

        #message.loading {
            background-color: #e7d4f5;
            color: #333;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oil & Gas Title Run Sheet Generator</h1>

        <form id="runSheetForm">
            <div class="form-group">
                <label for="abstractorName">Abstractor Name *</label>
                <input type="text" id="abstractorName" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="propertyDescription">Property Description *</label>
                <input type="text" id="propertyDescription" placeholder="Enter property description" required>
            </div>

            <div class="form-group">
                <label for="parcelNo">Parcel Number</label>
                <input type="text" id="parcelNo" placeholder="e.g., 12-22-7">
            </div>

            <div class="form-group">
                <label for="acreage">Acreage</label>
                <input type="text" id="acreage" placeholder="e.g., 16.4">
            </div>

            <div class="form-group">
                <label for="district">District</label>
                <input type="text" id="district" placeholder="e.g., Mannington District">
            </div>

            <div class="form-group">
                <label for="county">County</label>
                <input type="text" id="county" placeholder="e.g., Marion">
            </div>

            <div class="form-group">
                <label for="documents">Upload Documents (PDF)</label>
                <input type="file" id="documents" multiple accept=".pdf">
            </div>

            <button type="button" onclick="generateRunSheet()">Generate Run Sheet</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        function generateRunSheet() {
            const abstractorName = document.getElementById('abstractorName').value;
            const propertyDescription = document.getElementById('propertyDescription').value;
            const parcelNo = document.getElementById('parcelNo').value;
            const acreage = document.getElementById('acreage').value;
            const district = document.getElementById('district').value;
            const county = document.getElementById('county').value;
            const messageDiv = document.getElementById('message');

            if (!abstractorName || !propertyDescription) {
                messageDiv.textContent = '❌ Please fill in Abstractor Name and Property Description';
                messageDiv.className = 'error';
                return;
            }

            messageDiv.textContent = '⏳ Generating run sheet...';
            messageDiv.className = 'loading';

            setTimeout(() => {
                downloadExcel(abstractorName, propertyDescription, parcelNo, acreage, district, county);
                messageDiv.textContent = '✅ Run sheet generated and downloaded!';
                messageDiv.className = 'success';
            }, 1000);
        }

        function downloadExcel(abstractorName, propertyDescription, parcelNo, acreage, district, county) {
            const htmlTable = `
            <table border="1">
                <tr>
                    <td colspan="7">
